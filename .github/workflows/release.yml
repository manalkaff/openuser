name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build · Test · Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `gh release create --generate-notes` can compute
          # notes from the previous tag.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Build release
        run: pnpm build:release

      - name: Pack smoke test
        run: pnpm test:pack

      # test:pack creates and then deletes its own tarball in cleanup, so pack a
      # fresh one here for both the npm publish and the GitHub release asset.
      - name: Pack tarball for release
        working-directory: packages/cli
        run: pnpm pack

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          TARBALL=$(ls packages/cli/openuser-*.tgz 2>/dev/null | head -1 || true)
          if [[ -n "$TARBALL" ]]; then
            gh release create "$TAG" "$TARBALL" \
              --title "$TAG" \
              --generate-notes
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
